# Workflow to automatically check and approve PRs created by Dependabot
#
# Runs build and lint checks to validate dependency updates,
# then auto-approves and auto-merges the PR if all checks pass.
#
name: Dependabot PR Check

on:
  pull_request_target:
    branches: ["master"]

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/src/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/src/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: ${{ steps.detect-package-manager.outputs.manager == 'yarn' && 'src/yarn.lock' || 'src/package-lock.json' }}

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            src/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('src/package-lock.json', 'src/yarn.lock') }}-${{ hashFiles('src/**.[jt]s', 'src/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('src/package-lock.json', 'src/yarn.lock') }}-

      - name: Install dependencies
        run: cd src && ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Run lint
        run: cd src && ${{ steps.detect-package-manager.outputs.manager }} run lint

      - name: Build with Next.js
        run: cd src && ${{ steps.detect-package-manager.outputs.manager }} run build

      - name: Auto-approve PR
        run: gh pr review --approve --body "LGTM" "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge PR
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
